name: Scheduled Full Test

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scheduled-full-test:
    runs-on: ubuntu-latest
    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
      PIP_CONSTRAINT: "${{ github.workspace }}/.github/constraints/ci-build.txt"

    steps:
      - uses: actions/checkout@v4

      # Shared Python/Poetry setup sequence.
      # Keep this block aligned with:
      # - .github/workflows/ci-pr.yml
      # - .github/workflows/ci-main.yml
      # - .github/workflows/docs-pr.yml
      # - .github/workflows/docs-publish.yml
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.4"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: scheduled-full-test-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install full test dependencies
        run: |
          poetry env use python
          poetry install -E gui -E query -E ocr --no-interaction --no-ansi --no-root

      - name: Run tests
        run: poetry run pytest --maxfail=1 --cov=tnh_scholar --cov-report=term-missing
