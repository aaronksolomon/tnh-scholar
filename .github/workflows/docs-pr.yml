name: Docs PR Validation

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yaml"
      - "scripts/check_readme_docs_drift.py"
      - "scripts/generate_doc_index.py"
      - "scripts/generate_index_md.py"
      - "scripts/generate_subdir_indexes.py"
      - "scripts/sync_readme.py"
      - "scripts/sync_root_docs.py"
      - "scripts/update_index_doc_map.py"
      - "scripts/validate_markdown.py"
      - "scripts/verify_doc_links.py"
      - ".github/workflows/docs-pr.yml"
      - ".github/workflows/docs-publish.yml"

permissions:
  contents: read

jobs:
  docs-pr-validation:
    runs-on: ubuntu-latest
    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"

    steps:
      - uses: actions/checkout@v4

      # Shared Python/Poetry setup sequence.
      # Keep this block aligned with:
      # - .github/workflows/ci-pr.yml
      # - .github/workflows/ci-main.yml
      # - .github/workflows/ci-scheduled.yml
      # - .github/workflows/docs-publish.yml
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.4"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: docs-pr-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install dependencies
        run: |
          poetry env use python
          poetry install --no-interaction --no-ansi --no-root

      - name: Check documentation drift
        run: |
          poetry run python scripts/check_readme_docs_drift.py
          cat docs_sync_report.txt
        continue-on-error: true

      - name: Verify README ↔ docs/index.md sync
        run: poetry run python scripts/sync_readme.py

      - name: Validate markdown
        run: poetry run python scripts/validate_markdown.py

      - name: Build MkDocs site (read-only)
        run: make docs-build-readonly

      - name: Verify docs validation left worktree unchanged
        run: git diff --exit-code
