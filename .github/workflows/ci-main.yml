name: Main CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  main-validation:
    runs-on: ubuntu-latest
    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
      PIP_CONSTRAINT: "${{ github.workspace }}/.github/constraints/ci-build.txt"

    steps:
      - uses: actions/checkout@v4

      # Shared Python/Poetry setup sequence.
      # Keep this block aligned with:
      # - .github/workflows/ci-pr.yml
      # - .github/workflows/ci-scheduled.yml
      # - .github/workflows/docs-pr.yml
      # - .github/workflows/docs-publish.yml
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.4"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: main-validation-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install validation dependencies
        run: |
          poetry env use python
          poetry install --no-interaction --no-ansi --no-root

      - name: Ruff lint
        run: poetry run ruff check .

      - name: Ruff format (check)
        run: poetry run ruff format --check .

      - name: Type checking
        run: poetry run mypy src/

      - name: Markdown lint
        run: npx markdownlint-cli2 '**/*.md' || echo "⚠️ Markdown linting found issues (advisory)"
        continue-on-error: true

      - name: Verify README ↔ docs/index.md sync
        run: poetry run python scripts/sync_readme.py
        continue-on-error: true

  main-test:
    runs-on: ubuntu-latest
    needs: main-validation
    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
      PIP_CONSTRAINT: "${{ github.workspace }}/.github/constraints/ci-build.txt"

    steps:
      - uses: actions/checkout@v4

      # Shared Python/Poetry setup sequence.
      # Keep this block aligned with:
      # - .github/workflows/ci-pr.yml
      # - .github/workflows/ci-scheduled.yml
      # - .github/workflows/docs-pr.yml
      # - .github/workflows/docs-publish.yml
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.4"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: main-test-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install full test dependencies
        run: |
          poetry env use python
          poetry install -E gui -E query -E ocr --no-interaction --no-ansi --no-root

      - name: Run tests
        run: poetry run pytest --maxfail=1 --cov=tnh_scholar --cov-report=term-missing
