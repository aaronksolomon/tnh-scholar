name: Docs Publish

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "README.md"
      - "mkdocs.yaml"
      - "scripts/check_readme_docs_drift.py"
      - "scripts/generate_doc_index.py"
      - "scripts/generate_index_md.py"
      - "scripts/generate_subdir_indexes.py"
      - "scripts/sync_readme.py"
      - "scripts/sync_root_docs.py"
      - "scripts/update_index_doc_map.py"
      - "scripts/validate_markdown.py"
      - "scripts/verify_doc_links.py"
      - ".github/workflows/docs-pr.yml"
      - ".github/workflows/docs-publish.yml"

jobs:
  docs-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"

    steps:
      - uses: actions/checkout@v4

      # Shared Python/Poetry setup sequence.
      # Keep this block aligned with:
      # - .github/workflows/ci-pr.yml
      # - .github/workflows/ci-main.yml
      # - .github/workflows/ci-scheduled.yml
      # - .github/workflows/docs-pr.yml
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.4"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: docs-publish-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install dependencies
        run: |
          poetry env use python
          poetry install --no-interaction --no-ansi --no-root

      - name: Check documentation drift
        run: |
          poetry run python scripts/check_readme_docs_drift.py
          cat docs_sync_report.txt
        continue-on-error: true

      - name: Verify README ↔ docs/index.md sync
        run: poetry run python scripts/sync_readme.py

      - name: Build documentation
        run: make docs-build

      - name: Upload docs artifact (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: site/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
