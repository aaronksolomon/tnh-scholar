name: PR Validation

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pr-validation:
    runs-on: ubuntu-latest
    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
      # See .github/constraints/ci-build.txt for the temporary setuptools cap.
      PIP_CONSTRAINT: "${{ github.workspace }}/.github/constraints/ci-build.txt"

    steps:
      - uses: actions/checkout@v4

      # Shared Python/Poetry setup sequence.
      # Keep this block aligned with:
      # - .github/workflows/ci-main.yml
      # - .github/workflows/ci-scheduled.yml
      # - .github/workflows/docs-pr.yml
      # - .github/workflows/docs-publish.yml
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.4"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: pr-validation-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install validation dependencies
        run: |
          poetry env use python
          poetry install --no-interaction --no-ansi --no-root

      - name: Ruff lint
        run: poetry run ruff check . || echo "⚠️ Ruff linting found issues (advisory)"
        continue-on-error: true

      - name: Ruff format (check)
        run: poetry run ruff format --check . || echo "⚠️ Ruff format check found issues (advisory)"
        continue-on-error: true

      - name: Type checking
        run: poetry run mypy src/ || echo "⚠️ Type checking found issues (advisory)"
        continue-on-error: true

      - name: Markdown lint
        run: npx markdownlint-cli2 '**/*.md' || echo "⚠️ Markdown linting found issues (advisory)"
        continue-on-error: true

      - name: Verify README ↔ docs/index.md sync
        run: poetry run python scripts/sync_readme.py
        continue-on-error: true

  full-test:
    if: contains(github.event.pull_request.labels.*.name, 'full-ci')
    runs-on: ubuntu-latest
    needs: pr-validation
    env:
      POETRY_VIRTUALENVS_IN_PROJECT: "true"
      PIP_CONSTRAINT: "${{ github.workspace }}/.github/constraints/ci-build.txt"

    steps:
      - uses: actions/checkout@v4

      # Shared Python/Poetry setup sequence.
      # Keep this block aligned with:
      # - .github/workflows/ci-main.yml
      # - .github/workflows/ci-scheduled.yml
      # - .github/workflows/docs-pr.yml
      # - .github/workflows/docs-publish.yml
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.4"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: full-test-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('poetry.lock', 'pyproject.toml') }}

      - name: Install full test dependencies
        run: |
          poetry env use python
          poetry install -E gui -E query -E ocr --no-interaction --no-ansi --no-root

      - name: Run tests
        run: poetry run pytest --maxfail=1 --cov=tnh_scholar --cov-report=term-missing
